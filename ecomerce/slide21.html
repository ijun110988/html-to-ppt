<!DOCTYPE html>

<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>WhatsApp Automation &amp; Scaling</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Inter:wght@300;400;600&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: #FFFFFF;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Abstract Background Elements */
        .bg-element {
            position: absolute;
            z-index: 0;
        }

        .bg-line-1 {
            width: 100%;
            height: 1px;
            background-color: #E5E7EB;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .bg-circle-left {
            width: 500px;
            height: 500px;
            border: 1px solid #F3F4F6;
            border-radius: 50%;
            top: 50%;
            left: -150px;
            transform: translateY(-50%);
        }

        .bg-circle-right {
            width: 400px;
            height: 400px;
            border: 1px solid #F3F4F6;
            border-radius: 50%;
            top: 50%;
            right: -100px;
            transform: translateY(-50%);
        }

        .accent-box {
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: #FAFAFA;
            top: 60px;
            right: 80px;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .accent-box i {
            font-size: 60px;
            color: #E5E7EB;
        }

        /* Central Content Box */
        .content-box {
            position: relative;
            z-index: 10;
            text-align: center;
            background-color: #FFFFFF;
            padding: 60px 80px;
            max-width: 1000px;
        }

        .section-label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.2em;
            color: #9CA3AF;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 64px;
            line-height: 1.1;
            color: #111827;
            margin: 0;
            text-transform: uppercase;
        }

        .divider-line {
            width: 120px;
            height: 6px;
            background-color: #D4AF37;
            /* Gold */
            margin: 30px auto;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 24px;
            color: #4B5563;
            line-height: 1.5;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Numbering */
        .section-number {
            position: absolute;
            top: 50%;
            left: 60px;
            transform: translateY(-50%);
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 180px;
            color: #F9FAFB;
            z-index: 1;
            line-height: 1;
        }

        /* Bottom Pattern */
        .bottom-pattern {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background-color: #0B0F19;
            /* Navy/Black */
        }

        .gold-tip {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 10px;
            background-color: #D4AF37;
        }

        /* Speaker Notes */
        .notes-container {
            display: none;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <!-- Background Elements -->
        <div class="bg-element bg-line-1"></div>
        <div class="bg-element bg-circle-left"></div>
        <div class="bg-element bg-circle-right"></div>
        <!-- Big Number Background -->
        <div class="section-number">05</div>
        <!-- Top Right Icon -->
        <div class="accent-box">
            <i class="fa-brands fa-whatsapp"></i>
        </div>
        <!-- Main Content -->
        <div class="content-box">
            <span class="section-label">Section 5</span>
            <h1>WhatsApp Automation<br />&amp; Scaling</h1>
            <div class="divider-line"></div>
            <p class="subtitle">
                Level Up dengan WA Otomatis
            </p>
        </div>
        <!-- Footer Elements -->
        <div class="bottom-pattern"></div>
        <div class="gold-tip"></div>
        <!-- Speaker Notes -->
        <div class="notes-container">
            Bagian final: bagaimana scale sistem dengan WhatsApp automation. Ini membuat customer experience excellent
            dan bisnis Anda bisa handle ratusan order per hari.
        </div>
    </div>
</body>

</html>
