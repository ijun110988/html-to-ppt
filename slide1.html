<!DOCTYPE html>

<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Automated Order System - Cover</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&amp;family=Inter:wght@300;400;600&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: #0B0F19;
            /* Deep Navy/Black */
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            z-index: 0;
        }

        .circle-1 {
            width: 600px;
            height: 600px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            /* Gold low opacity */
            top: -100px;
            right: -100px;
        }

        .circle-2 {
            width: 450px;
            height: 450px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            top: -25px;
            right: -25px;
        }

        .circle-3 {
            width: 800px;
            height: 800px;
            background-color: #111827;
            border-radius: 50%;
            top: 50%;
            left: -200px;
            transform: translateY(-50%);
            z-index: 0;
        }

        .content-left {
            flex: 1;
            padding: 80px 60px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content-right {
            flex: 1;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: #FFFFFF;
            text-transform: uppercase;
        }

        .gold-text {
            color: #D4AF37;
            /* Gold */
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #D4AF37;
            text-transform: uppercase;
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            color: #9CA3AF;
        }

        .accent-line {
            width: 80px;
            height: 6px;
            background-color: #D4AF37;
            margin-bottom: 30px;
        }

        /* Tech Visuals on Right */
        .tech-grid {
            position: relative;
            width: 400px;
            height: 400px;
        }

        .icon-card {
            position: absolute;
            background-color: #1F2937;
            border: 1px solid #374151;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .center-card {
            width: 140px;
            height: 140px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            border: 2px solid #D4AF37;
        }

        .orbit-card {
            width: 80px;
            height: 80px;
            z-index: 1;
        }

        .card-1 {
            top: 0;
            left: 50%;
            transform: translate(-50%, 0);
        }

        .card-2 {
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 0);
        }

        .card-3 {
            top: 50%;
            left: 0;
            transform: translate(0, -50%);
        }

        .card-4 {
            top: 50%;
            right: 0;
            transform: translate(0, -50%);
        }

        .connector {
            position: absolute;
            background-color: #374151;
            z-index: 0;
        }

        .v-line {
            width: 2px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }

        .h-line {
            width: 100%;
            height: 2px;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .floating-badge {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <!-- Background Elements -->
        <div class="decorative-circle circle-1"></div>
        <div class="decorative-circle circle-2"></div>
        <div class="decorative-circle circle-3"></div>
        <!-- Left Content: Text -->
        <div class="content-left">
            <div class="accent-line"></div>
            <p class="subtitle text-xl mb-4">Training Premium Digital</p>
            <h1 class="text-6xl mb-6">
                AUTOMATED<br />
                <span class="gold-text">ORDER SYSTEM</span>
            </h1>
            <p class="text-2xl text-white font-medium mb-2">
                Membangun Sistem Jualan Otomatis <br />Tanpa Marketplace
            </p>
            <p class="tagline text-lg mt-6 max-w-lg leading-relaxed">
                Sistem Bisnis Modern untuk UMKM, Reseller &amp; Online Seller.
                Tingkatkan profit dan efisiensi dengan database sendiri.
            </p>
        </div>
        <!-- Right Content: Visuals -->
        <div class="content-right">
            <div class="tech-grid">
                <!-- Connectors -->
                <div class="connector v-line"></div>
                <div class="connector h-line"></div>
                <!-- Center Hub -->
                <div class="icon-card center-card">
                    <i class="fa-solid fa-network-wired text-5xl text-white"></i>
                </div>
                <!-- Orbit Icons -->
                <div class="icon-card orbit-card card-1">
                    <i class="fa-brands fa-whatsapp text-3xl" style="color: #25D366;"></i>
                </div>
                <div class="icon-card orbit-card card-2">
                    <i class="fa-solid fa-file-invoice-dollar text-3xl" style="color: #D4AF37;"></i>
                </div>
                <div class="icon-card orbit-card card-3">
                    <i class="fa-solid fa-users text-3xl text-blue-400"></i>
                </div>
                <div class="icon-card orbit-card card-4">
                    <i class="fa-solid fa-cart-shopping text-3xl text-purple-400"></i>
                </div>
            </div>
        </div>
        <!-- Badge -->
        <div class="floating-badge">
            <i class="fa-solid fa-rocket text-yellow-400"></i>
            <span>Scale Up Your Business</span>
        </div>
    </div>
</body>

</html>
