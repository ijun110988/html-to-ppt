<!DOCTYPE html>

<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
        }

        .slide {
            width: 1280px;
            height: 720px;
            display: flex;
            background: #0E1A3A;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            position: relative;
            overflow: hidden;
        }

        .gold {
            color: #F5A623;
        }

        .gold-bg {
            background: #F5A623;
        }

        .muted2 {
            color: rgba(255, 255, 255, 0.62);
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(245, 166, 35, 0.20);
        }

        .glow {
            position: absolute;
            inset: -45% -35% auto auto;
            width: 860px;
            height: 860px;
            border-radius: 9999px;
            background: radial-gradient(circle at 30% 30%, rgba(245, 166, 35, 0.14), rgba(14, 26, 58, 0) 60%);
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="slide">
        <div class="absolute inset-0" style="pointer-events:none;">
            <div class="glow"></div>
            <div class="absolute"
                style="left:-140px; top:-160px; width:560px; height:560px; border-radius:9999px; border:2px solid rgba(245,166,35,0.22);">
            </div>
            <div class="absolute"
                style="left:86px; top:78px; width:190px; height:190px; border-radius:9999px; border:2px solid rgba(255,255,255,0.10);">
            </div>
            <div class="absolute"
                style="right:-170px; bottom:-190px; width:650px; height:650px; border-radius:9999px; border:2px solid rgba(245,166,35,0.18);">
            </div>
            <div class="absolute"
                style="right:120px; bottom:96px; width:230px; height:230px; border-radius:9999px; border:2px solid rgba(255,255,255,0.10);">
            </div>
            <div class="absolute" style="left:0; top:0; width:100%; height:100%;">
                <div class="absolute gold-bg" style="left:0; top:0; width:10px; height:100%; opacity:0.9;"></div>
                <div class="absolute" style="left:18px; top:0; width:2px; height:100%; background: rgba(245,166,35,0.30);"></div>
                <div class="absolute" style="left:0; top:66px; width:100%; height:1px; background: rgba(255,255,255,0.06);"></div>
            </div>
        </div>
        <div class="relative flex-1 flex flex-col">
            <div class="w-full px-16 pt-10 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="card flex items-center justify-center" style="width:44px; height:44px; border-radius:10px;">
                        <i class="fa-solid fa-building" style="color: rgba(255,255,255,0.82); font-size:18px;"></i>
                    </div>
                    <div class="flex flex-col">
                        <p class="muted2 text-xs tracking-widest font-semibold">UNTUK</p>
                        <p class="text-white text-sm font-semibold tracking-wide">PT YKK AP Indonesia</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <div class="card px-4 py-2 rounded-full">
                        <p class="text-white text-xs font-semibold tracking-widest">TAHUN <span class="gold">2026</span></p>
                    </div>
                </div>
            </div>

            <div class="flex-1"></div>

            <div class="w-full px-16 pb-10 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div style="width:8px; height:8px; border-radius:9999px; background:#F5A623;"></div>
                    <p class="muted2 text-xs">Proposal Implementasi LMS</p>
                </div>
                <div class="flex items-center space-x-3">
                    <i class="fa-regular fa-calendar" style="color: rgba(255,255,255,0.70); font-size:12px;"></i>
                    <p class="muted2 text-xs">2026</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
