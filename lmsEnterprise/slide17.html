<!DOCTYPE html>

<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=1280, height=720" name="viewport" />
    <title>Contact Information</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            position: relative;
            background-color: #1B3A6B;
            overflow: hidden;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
            padding: 80px 100px;
        }

        .logo-area {
            position: absolute;
            width: 140px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .logo-left {
            top: 40px;
            left: 50px;
        }

        .logo-right {
            top: 40px;
            right: 50px;
        }

        .geometric-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            z-index: 1;
        }

        .main-title {
            font-size: 56px;
            font-weight: 800;
            color: #FFFFFF;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 18px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 22px;
            font-weight: 300;
            color: #E0E7FF;
            text-align: center;
            margin-bottom: 46px;
            letter-spacing: 0.5px;
        }

        .divider {
            width: 120px;
            height: 3px;
            background-color: #2563EB;
            margin: 0 auto 40px;
        }

        .info-section {
            text-align: center;
            margin-bottom: 18px;
        }

        .info-label {
            font-size: 13px;
            font-weight: 600;
            color: #93C5FD;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 600;
            color: #FFFFFF;
            letter-spacing: 0.3px;
            line-height: 1.35;
        }

        .date-badge {
            position: absolute;
            bottom: 40px;
            right: 50px;
            background-color: #2563EB;
            color: #FFFFFF;
            padding: 10px 28px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 2;
        }

        .accent-line {
            position: absolute;
            height: 4px;
            background-color: #2563EB;
            z-index: 1;
        }

        .accent-line-1 {
            top: 0;
            left: 0;
            width: 300px;
        }

        .accent-line-2 {
            bottom: 0;
            right: 0;
            width: 400px;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <svg class="geometric-pattern" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1280 720">
            <defs>
                <pattern height="80" id="grid" patternUnits="userSpaceOnUse" width="80">
                    <path d="M 80 0 L 0 0 0 80" fill="none" stroke="white" stroke-width="1"></path>
                </pattern>
            </defs>
            <rect fill="url(#grid)" height="720" width="1280"></rect>
            <circle cx="1100" cy="150" fill="none" opacity="0.4" r="200" stroke="white" stroke-width="2"></circle>
            <circle cx="200" cy="600" fill="none" opacity="0.3" r="150" stroke="white" stroke-width="2"></circle>
            <polygon fill="none" opacity="0.3" points="900,500 1000,650 800,650" stroke="white" stroke-width="2"></polygon>
        </svg>
        <div class="accent-line accent-line-1"></div>
        <div class="accent-line accent-line-2"></div>

        <div class="content-wrapper">
            <div class="main-title">
                <p>Contact Information</p>
            </div>
            <div class="subtitle">
                <p>Get in touch with us</p>
            </div>

            <div class="divider"></div>

            <div class="info-section">
                <div class="info-label">
                    <i class="fas fa-map-marker-alt"></i>
                    <p>Address</p>
                </div>
                <div class="info-value">
                    <p>Ruko Golden Madrid Blok D 26</p>
                    <p style="font-size: 16px; font-weight: 500; margin-top: 6px; color: #E0E7FF;">Jl. Ltn Sutopo No1 BSD City Serpong, Tangerang Selatan, Banten</p>
                </div>
            </div>

            <div class="info-section" style="margin-top: 14px;">
                <div class="info-label">
                    <i class="fas fa-phone-alt"></i>
                    <p>Phone</p>
                </div>
                <div class="info-value">
                    <p>+021-531-60-529</p>
                    <p>+62 817-7908-4068</p>
                </div>
            </div>

            <div class="info-section" style="margin-top: 14px;">
                <div class="info-label">
                    <i class="fas fa-envelope"></i>
                    <p>Email</p>
                </div>
                <div class="info-value">
                    <p>ijun.wahyudin@mustikasinergi.com</p>
                    <p>info.mustikasinergi@gmail.com</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
